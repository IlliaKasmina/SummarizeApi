# CI/CD for SummarizeApi.
#
# Pull requests:      build + tests + Bicep compile check.
# Push to main:       same, then — only if src/ changed — zip deploy of the
#                     app to the existing web app, finishing with a /health
#                     smoke test. workflow_dispatch always deploys (manual
#                     override for redeploys without a code change).
#
# Infrastructure is NOT provisioned here — resources are deployed manually
# with `az deployment group create` (see README "Deploy to Azure"). The
# pipeline only ships application code, so its identity needs deploy rights
# on the web app, nothing more.
#
# Azure auth uses OIDC federated credentials (azure/login) — no client secret
# is stored in GitHub. Required repository secrets:
#   AZURE_CLIENT_ID        app registration (federated credential) client id
#   AZURE_TENANT_ID        Entra tenant id
#   AZURE_SUBSCRIPTION_ID  target subscription id
#
# One-time Azure setup (federated credential + RBAC) is documented in
# README.md under "CI/CD with GitHub Actions".

name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# AZURE_RESOURCE_GROUP and AZURE_WEBAPP_NAME come from repository *variables*
# (Settings -> Secrets and variables -> Actions -> Variables) so no
# environment-specific names live in the repo. Variables, not secrets:
# the values are not sensitive, and secrets would be masked in logs,
# hiding the deploy target and smoke-test URL when debugging.
env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  DOTNET_VERSION: 10.0.x

permissions:
  contents: read
  id-token: write # required for OIDC login to Azure

# Never run two deploys at once; let the newest queued run win.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    outputs:
      code-changed: ${{ steps.changes.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      # Deploy gate: did application code actually change? Build and tests
      # always run; the deploy job is skipped for docs/infra-only pushes.
      - name: Detect code changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'src/**'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SummarizeApi.slnx

      - name: Build
        run: dotnet build SummarizeApi.slnx --no-restore -c Release

      - name: Test
        run: dotnet test SummarizeApi.slnx --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore

      # Compiles the template; fails the build on Bicep errors without
      # touching Azure.
      - name: Validate Bicep template
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Publish
        run: dotnet publish src/SummarizeApi -c Release -o publish

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: publish/

  deploy:
    # Deploys only on main pushes that touched src/ (or manual dispatch).
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      (needs.build-test.outputs.code-changed == 'true' || github.event_name == 'workflow_dispatch')
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: publish

      - name: Zip deploy to App Service
        run: |
          cd publish
          zip -r ../app.zip .
          cd ..
          az webapp deploy \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --src-path app.zip \
            --type zip

      - name: Smoke test /health
        run: |
          url="https://${AZURE_WEBAPP_NAME}.azurewebsites.net/health"
          for i in $(seq 1 12); do
            if curl -fsS --max-time 10 "$url"; then
              echo "Health check passed."
              exit 0
            fi
            echo "Attempt $i failed; retrying in 10s..."
            sleep 10
          done
          echo "Health check did not pass within 2 minutes." >&2
          exit 1
