# CI/CD for SummarizeApi.
#
# Pull requests:      build + tests + Bicep compile check.
# Push to main:       same, then deploy infra (Bicep) and the app (zip deploy)
#                     into the existing resource group, finishing with a
#                     /health smoke test.
#
# Azure auth uses OIDC federated credentials (azure/login) — no client secret
# is stored in GitHub. Required repository secrets:
#   AZURE_CLIENT_ID        app registration (federated credential) client id
#   AZURE_TENANT_ID        Entra tenant id
#   AZURE_SUBSCRIPTION_ID  target subscription id
#   SUMMARIZE_API_KEY      value clients must send in X-Api-Key (>= 16 chars)
#
# One-time Azure setup (resource group + federated credential) is documented
# in README.md under "CI/CD with GitHub Actions".

name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: SB_HCMLMS_ILKAS
  DOTNET_VERSION: 10.0.x

permissions:
  contents: read
  id-token: write # required for OIDC login to Azure

# Never run two deploys at once; let the newest queued run win.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore SummarizeApi.slnx

      - name: Build
        run: dotnet build SummarizeApi.slnx --no-restore -c Release

      - name: Test
        run: dotnet test SummarizeApi.slnx --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore

      # Compiles the template; fails the build on Bicep errors without
      # touching Azure.
      - name: Validate Bicep template
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Publish
        run: dotnet publish src/SummarizeApi -c Release -o publish

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: publish/

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # The API key is passed via env so the secret never appears in the
      # rendered shell command.
      - name: Deploy infrastructure (Bicep)
        id: infra
        env:
          API_KEY: ${{ secrets.SUMMARIZE_API_KEY }}
        run: |
          webAppName=$(az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "summarizeapi-${{ github.run_number }}" \
            --template-file infra/main.bicep \
            --parameters apiKey="$API_KEY" \
            --query properties.outputs.webAppName.value -o tsv)
          echo "webAppName=$webAppName" >> "$GITHUB_OUTPUT"

      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: publish

      - name: Zip deploy to App Service
        run: |
          cd publish
          zip -r ../app.zip .
          cd ..
          az webapp deploy \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "${{ steps.infra.outputs.webAppName }}" \
            --src-path app.zip \
            --type zip

      - name: Smoke test /health
        run: |
          url="https://${{ steps.infra.outputs.webAppName }}.azurewebsites.net/health"
          for i in $(seq 1 12); do
            if curl -fsS --max-time 10 "$url"; then
              echo "Health check passed."
              exit 0
            fi
            echo "Attempt $i failed; retrying in 10s..."
            sleep 10
          done
          echo "Health check did not pass within 2 minutes." >&2
          exit 1
